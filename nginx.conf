user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # DNS embebido de Docker: sin esto, nginx resuelve api/frontend solo al arrancar y tras
        # `docker compose up --build` los contenedores nuevos pueden tener otra IP → 502 Bad Gateway.
        resolver 127.0.0.11 valid=10s ipv6=off;

        client_max_body_size 10M;

        # API (Express) — service name must match docker-compose `api`
        location /api/ {
            set $api_upstream api:3000;
            # Sin path en proxy_pass: se reenvía la URI completa (/api/...) — obligatorio con variables.
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA (Vite preview) — service name must match docker-compose `frontend`
        location / {
            set $frontend_upstream frontend:4173;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Archivos locales: solo enlaces firmados bajo /api/files/local (no exponer /uploads en nginx).
    }

    # Descomenta el bloque siguiente cuando existan ./ssl/fullchain.pem y ./ssl/privkey.pem (Let's Encrypt u otro).
    # include /etc/nginx/ssl-server.conf;
}

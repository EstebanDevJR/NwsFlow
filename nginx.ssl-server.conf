# Opcional: en nginx.conf descomenta dentro del bloque `http { }`:
#   include /etc/nginx/ssl-server.conf;
# Monta este archivo y los certificados, por ejemplo en docker-compose:
#   - ./nginx.ssl-server.conf:/etc/nginx/ssl-server.conf:ro
#   - ./ssl:/etc/nginx/ssl:ro

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10M;

    location /api/ {
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Debe coincidir con `serve` en docker-compose.prod (frontend:4173).
        set $frontend_upstream frontend:4173;
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Archivos locales: solo enlaces firmados bajo /api/files/local (API Express).
}

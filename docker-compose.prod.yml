services:
  postgres:
    image: postgres:16-alpine
    container_name: paymentflow_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-paymentflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-paymentflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-paymentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paymentflow_network

  redis:
    image: redis:7-alpine
    container_name: paymentflow_redis_prod
    restart: unless-stopped
    # En droplets con poca RAM, baja maxmemory (ej. 64mb) si Redis no arranca.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      # start_period: Redis + AOF en disco pueden tardar en droplets lentos o con I/O limitado
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - paymentflow_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    container_name: paymentflow_api_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-paymentflow}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-paymentflow}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-1200}
      REDIS_URL: redis://redis:6379
      BULLMQ_REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_PORT: ${TELEGRAM_WEBHOOK_PORT:-8443}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      # Origen público sin ruta (no incluyas /api). Si usas https://dominio.com/api, se normaliza al origen.
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost}
      # Opcional (>=32 chars): firma estable para /api/files/local si rotas JWT_SECRET sin invalidar enlaces.
      UPLOAD_SIGNING_SECRET: ${UPLOAD_SIGNING_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      SMTP_FROM: ${SMTP_FROM:-}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Si es false, ejecuta manualmente: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - paymentflow_network
    volumes:
      - uploads:/app/uploads

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    container_name: paymentflow_telegram_bot_prod
    restart: unless-stopped
    command: ["node", "apps/telegram-bot/dist/apps/telegram-bot/src/index.js"]
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BOT_API_URL: ${BOT_API_URL:-http://api:3000/api}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_PORT: ${TELEGRAM_WEBHOOK_PORT:-8443}
      REDIS_URL: redis://redis:6379
    depends_on:
      - api
      - redis
    networks:
      - paymentflow_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    container_name: paymentflow_frontend_prod
    restart: unless-stopped
    # -s: SPA — rutas como /login sirven index.html (sin esto, GET /login → 404).
    command: ["npx", "serve", "-s", "apps/web/dist", "-l", "4173"]
    depends_on:
      - api
    networks:
      - paymentflow_network

  nginx:
    image: nginx:alpine
    container_name: paymentflow_nginx_prod
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.ssl-server.conf:/etc/nginx/ssl-server.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads:/var/www/html/uploads
    depends_on:
      - api
      - frontend
    networks:
      - paymentflow_network

volumes:
  postgres_data:
  uploads:
  redis_data:

networks:
  paymentflow_network:
    driver: bridge

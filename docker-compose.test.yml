services:
  postgres-test:
    image: postgres:16-alpine
    container_name: paymentflow-postgres-test
    environment:
      POSTGRES_USER: paymentflow
      POSTGRES_PASSWORD: paymentflow
      POSTGRES_DB: paymentflow_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paymentflow -d paymentflow_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: paymentflow-redis-test
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
